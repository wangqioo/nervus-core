# Redis 配置 — Nervus Context Graph（工作记忆）
# 优化：边缘设备低内存，TTL 自动淘汰

bind 0.0.0.0
port 6379
protected-mode no

# 最大内存 200MB，超出使用 LRU 淘汰
maxmemory 200mb
maxmemory-policy allkeys-lru

# 持久化：AOF 每秒同步（平衡性能与安全）
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite yes

# 快照备份
save 900 1
save 300 10
save 60 10000

# 日志
loglevel notice
logfile ""

# 数据目录
dir /data

# 最大连接数
maxclients 100

# 禁用危险命令
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command DEBUG ""
