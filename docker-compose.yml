      dockerfile: apps/status-sense/Dockerfile
    container_name: nervus-app-status-sense
    restart: unless-stopped
    ports:
      - "8013:8013"
    environment:
      NATS_URL: nats://nervus-nats:4222
      REDIS_URL: redis://nervus-redis:6379
      ARBOR_URL: http://nervus-arbor:8090
      APP_PORT: 8013
      DB_PATH: /data/status-sense.db
    volumes:
      - status-sense-data:/data
    depends_on:
