    networks:
      nervus-net:

  app-workflow-viewer:
    build:
      context: .
      dockerfile: apps/workflow-viewer/Dockerfile
    container_name: nervus-app-workflow
    restart: unless-stopped
    ports:
      - "8014:8014"
    environment:
      NATS_URL: nats://nervus-nats:4222
      REDIS_URL: redis://nervus-redis:6379
      ARBOR_URL: http://nervus-arbor:8090
      APP_PORT: 8014
    depends_on:
      - arbor-core
    networks:
      nervus-net:

volumes:
  caddy-data:
  caddy-certs:
  notes-data:
  pdf-data:
  video-data:
  rss-data:
  calendar-data:
  reminder-data:
  status-sense-data:
