<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Nervus · 感知</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
*{scrollbar-width:none}*::-webkit-scrollbar{display:none}

:root{
  --bg:#07070E;
  --s1:rgba(255,255,255,.04);
  --s2:rgba(255,255,255,.07);
  --s3:rgba(255,255,255,.12);
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.13);
  --text:#EEEEF8;
  --text2:rgba(238,238,248,.55);
  --text3:rgba(238,238,248,.28);
  --accent:#8B72FF;
  --accent-s:rgba(139,114,255,.13);
  --teal:#5EEAB5;
  --teal-s:rgba(94,234,181,.13);
  --orange:#FFAA5C;
  --orange-s:rgba(255,170,92,.13);
  --red:#FF6E7A;
  --red-s:rgba(255,110,122,.13);
}
@media(prefers-color-scheme:light){
  :root{
    --bg:#F2F2F7;
    --s1:rgba(0,0,0,.04);
    --s2:rgba(255,255,255,.72);
    --s3:rgba(0,0,0,.08);
    --border:rgba(0,0,0,.07);
    --border2:rgba(0,0,0,.12);
    --text:#1C1C1E;
    --text2:rgba(28,28,30,.55);
    --text3:rgba(28,28,30,.35);
    --accent:#6B52F0;
    --teal:#00C896;
    --orange:#E0820A;
    --red:#E8344A;
  }
}

body{background:var(--bg);color:var(--text);font-family:'PingFang SC','Outfit',-apple-system,sans-serif;min-height:100vh;padding:0 0 100px}

.page{padding:66px 18px 0;display:flex;flex-direction:column;gap:14px}

/* 顶部标题 */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 2px 4px}
.hdr-title{font-size:22px;font-weight:800;letter-spacing:-.5px}
.hdr-sub{font-size:13px;color:var(--text3);font-family:'Outfit',sans-serif}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--teal);margin-right:5px;box-shadow:0 0 6px var(--teal)}

/* 大卡 */
.gc{background:var(--s2);border:1px solid var(--border2);border-radius:24px;padding:20px;position:relative;overflow:hidden;
  box-shadow:0 5px 0 -2px var(--s2),0 5px 0 -1px var(--border2),0 10px 0 -4px var(--s1),0 10px 0 -3px var(--border2)}
.gc::after{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 60%);pointer-events:none}

/* 综合状态球 */
.status-orb{display:flex;flex-direction:column;align-items:center;gap:10px;padding:10px 0 6px}
.orb-ring{width:96px;height:96px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center}
.orb-ring::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:conic-gradient(var(--teal) var(--pct,60%),var(--s3) 0);animation:orb-spin 8s linear infinite}
.orb-ring::after{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--bg)}
.orb-inner{position:relative;z-index:1;text-align:center}
.orb-score{font-size:28px;font-weight:800;font-family:'Outfit',sans-serif;line-height:1}
.orb-label{font-size:11px;color:var(--text2);margin-top:2px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.status-desc{font-size:13px;color:var(--text2);text-align:center;line-height:1.6;max-width:220px}
@keyframes orb-spin{to{transform:rotate(360deg)}}

/* 四格状态卡 */
.quad-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.qc{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:14px 15px;
  box-shadow:0 4px 0 -2px var(--s2),0 4px 0 -1px var(--border),0 8px 0 -4px var(--s1),0 8px 0 -3px var(--border2)}
.qc-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.qc-value{font-size:18px;font-weight:700;font-family:'Outfit',sans-serif;line-height:1.1}
.qc-sub{font-size:12px;color:var(--text2);margin-top:4px}
.qc-bar{height:3px;border-radius:2px;background:var(--s3);margin-top:8px;overflow:hidden}
.qc-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}

/* 事件流时间线 */
.tl-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.tl-item:last-child{border-bottom:none}
.tl-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.tl-content{flex:1;min-width:0}
.tl-title{font-size:13px;font-weight:600;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-meta{font-size:11px;color:var(--text3);margin-top:2px}

/* 精力曲线 */
.energy-chart{display:flex;align-items:flex-end;gap:4px;height:48px;padding:0 4px}
.energy-bar{flex:1;border-radius:3px 3px 0 0;transition:height .4s ease,opacity .3s}
.energy-bar.active{opacity:1}
.energy-bar.past{opacity:.5}
.energy-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:6px;padding:0 4px}

/* 信号可视化 */
.signal-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.signal-row:last-child{border-bottom:none}
.signal-name{font-size:12px;color:var(--text2);flex:1}
.signal-track{flex:2;height:4px;background:var(--s3);border-radius:2px;overflow:hidden}
.signal-fill{height:100%;border-radius:2px;transition:width .5s ease}
.signal-val{font-size:12px;font-weight:600;font-family:'Outfit',sans-serif;width:36px;text-align:right}

/* Nervus 建议 */
.suggest-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.suggest-item:last-child{border-bottom:none}
.suggest-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.suggest-text{font-size:13px;color:var(--text2);line-height:1.5}
.suggest-action{font-size:12px;font-weight:600;color:var(--accent);margin-top:4px;cursor:pointer}

/* 今夜计划 */
.plan-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.plan-item:last-child{border-bottom:none}
.plan-icon{font-size:16px;width:24px;text-align:center}
.plan-text{font-size:13px;color:var(--text2);flex:1}
.plan-time{font-size:11px;color:var(--text3);font-family:'Outfit',sans-serif}

/* 章节标题 */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.section-title{font-size:15px;font-weight:700}
.section-badge{font-size:10px;color:var(--text3);font-family:'Outfit',sans-serif;background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:2px 8px}

/* 加载状态 */
.skeleton{background:linear-gradient(90deg,var(--s1) 25%,var(--s2) 50%,var(--s1) 75%);background-size:200%;animation:sk-wave 1.5s infinite}
@keyframes sk-wave{0%{background-position:200%}100%{background-position:-200%}}

/* 刷新按钮 */
.refresh-btn{width:28px;height:28px;border-radius:50%;background:var(--s2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .2s;color:var(--text2)}
.refresh-btn:active{opacity:.6}
.refresh-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* 热量环 */
.calorie-ring-wrap{display:flex;align-items:center;gap:16px}
.calorie-ring{position:relative;width:72px;height:72px;flex-shrink:0}
.calorie-ring svg{transform:rotate(-90deg)}
.calorie-ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1}
.calorie-ring-num{font-size:16px;font-weight:700;font-family:'Outfit',sans-serif}
.calorie-ring-unit{font-size:9px;color:var(--text3);margin-top:1px;text-transform:uppercase}
.calorie-stats{flex:1}
.calorie-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);padding:3px 0}
.calorie-row strong{color:var(--text);font-weight:600;font-family:'Outfit',sans-serif}
</style>
</head>
<body>

<div class="page" id="page">

  <!-- 顶部标题 -->
  <div class="hdr">
    <div>
      <div class="hdr-title">感知</div>
      <div class="hdr-sub" id="lastUpdate"><span class="dot"></span>正在连接…</div>
    </div>
    <div class="refresh-btn" id="refreshBtn" onclick="refresh()">
      <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3"/></svg>
    </div>
  </div>

  <!-- ① 综合状态球 -->
  <div class="gc">
    <div class="section-hdr" style="margin-bottom:14px">
      <span class="section-title">综合状态</span>
      <span class="section-badge" id="stateMode">评估中</span>
    </div>
    <div class="status-orb">
      <div class="orb-ring" id="orbRing" style="--pct:60%">
        <div class="orb-inner">
          <div class="orb-score" id="orbScore">—</div>
          <div class="orb-label" id="orbLabel">加载中</div>
        </div>
      </div>
      <div class="status-desc" id="statusDesc">正在读取系统感知数据…</div>
    </div>
  </div>

  <!-- ② 四格状态卡 -->
  <div class="quad-grid">
    <div class="qc">
      <div class="qc-label">认知负荷</div>
      <div class="qc-value" id="cogLoad">—</div>
      <div class="qc-sub" id="cogSub">-</div>
      <div class="qc-bar"><div class="qc-bar-fill" id="cogBar" style="width:50%;background:var(--accent)"></div></div>
    </div>
    <div class="qc">
      <div class="qc-label">热量预算</div>
      <div class="calorie-ring-wrap" style="padding-top:4px">
        <div class="calorie-ring">
          <svg width="72" height="72" viewBox="0 0 72 72">
            <circle cx="36" cy="36" r="30" fill="none" stroke="var(--s3)" stroke-width="6"/>
            <circle cx="36" cy="36" r="30" fill="none" stroke="var(--teal)" stroke-width="6"
              stroke-dasharray="188.5" id="calorieDash" stroke-dashoffset="75" stroke-linecap="round"
              style="transition:stroke-dashoffset .6s ease"/>
          </svg>
          <div class="calorie-ring-text">
            <span class="calorie-ring-num" id="calorieNum">—</span>
            <span class="calorie-ring-unit">剩余</span>
          </div>
        </div>
      </div>
    </div>
    <div class="qc">
      <div class="qc-label">情绪状态</div>
      <div class="qc-value" id="moodVal">—</div>
      <div class="qc-sub" id="moodSub">-</div>
    </div>
    <div class="qc">
      <div class="qc-label">当下模式</div>
      <div class="qc-value" id="modeVal">—</div>
      <div class="qc-sub" id="modeSub">-</div>
    </div>
  </div>

  <!-- ③ Nervus 今日事件流 -->
  <div class="gc">
    <div class="section-hdr" style="margin-bottom:12px">
      <span class="section-title">今日事件流</span>
      <span class="section-badge" id="eventCount">0 件</span>
    </div>
    <div id="eventTimeline">
      <div class="tl-item"><div class="tl-dot skeleton" style="border-radius:50%;width:8px;height:8px;margin-top:5px"></div><div class="tl-content"><div class="skeleton" style="height:13px;border-radius:4px;width:80%;margin-bottom:4px"></div><div class="skeleton" style="height:11px;border-radius:4px;width:50%"></div></div></div>
    </div>
  </div>

  <!-- ④ 认知负荷推断依据 -->
  <div class="gc">
    <div class="section-hdr" style="margin-bottom:12px">
      <span class="section-title">负荷推断依据</span>
    </div>
    <div id="signalList">
      <div class="signal-row"><div class="signal-name skeleton" style="height:12px;border-radius:3px"></div><div class="signal-track" style="flex:2"><div class="signal-fill skeleton" style="width:60%;background:var(--s3)"></div></div><div class="signal-val skeleton" style="height:12px;border-radius:3px"></div></div>
    </div>
  </div>

  <!-- ⑤ 今日精力曲线 -->
  <div class="gc">
    <div class="section-hdr" style="margin-bottom:12px">
      <span class="section-title">今日精力曲线</span>
    </div>
    <div class="energy-chart" id="energyChart"></div>
    <div class="energy-label" id="energyLabel"></div>
  </div>

  <!-- ⑥ 热量详情（物理维度扩展） -->
  <div class="gc" id="calorieCard">
    <div class="section-hdr" style="margin-bottom:12px">
      <span class="section-title">今日饮食</span>
      <span class="section-badge" id="calorieBadge">—</span>
    </div>
    <div id="calorieDetail"></div>
  </div>

  <!-- ⑦ 旅行状态（旅行中才显示） -->
  <div class="gc" id="travelCard" style="display:none">
    <div class="section-hdr" style="margin-bottom:12px">
      <span class="section-title">当前旅行</span>
      <span class="section-badge">进行中</span>
    </div>
    <div id="travelDetail"></div>
  </div>

  <!-- ⑧ Nervus 建议 -->
  <div class="gc">
    <div class="section-hdr" style="margin-bottom:12px">
      <span class="section-title">Nervus 建议</span>
    </div>
    <div id="suggestionList">
      <div class="suggest-item"><div class="suggest-icon" style="background:var(--teal-s)">💡</div><div><div class="suggest-text">正在分析你的状态，稍后给出建议…</div></div></div>
    </div>
  </div>

  <!-- ⑨ 今夜计划 -->
  <div class="gc">
    <div class="section-hdr" style="margin-bottom:12px">
      <span class="section-title">今夜计划</span>
      <span class="section-badge">入睡后</span>
    </div>
    <div id="tonightPlan">
      <div class="plan-item"><span class="plan-icon">🌙</span><span class="plan-text">系统将在你入睡后安静工作</span><span class="plan-time"></span></div>
    </div>
  </div>

</div>

<script>
const API_BASE = window.location.origin  // sense 服务同域

let state = {}
let refreshing = false

// ── 数据获取 ──────────────────────────────────────────────

async function fetchState() {
  try {
    const r = await fetch(`${API_BASE}/user-state`)
    if (!r.ok) throw new Error(`HTTP ${r.status}`)
    return await r.json()
  } catch (e) {
    console.error('fetchState failed:', e)
    return null
  }
}

async function fetchExecLogs() {
  try {
    const r = await fetch(`${window.location.protocol}//${window.location.hostname}:8090/logs?limit=10`)
    if (!r.ok) return []
    const d = await r.json()
    return d.logs || []
  } catch { return [] }
}

async function fetchCalorieSummary() {
  try {
    const r = await fetch(`${window.location.protocol}//${window.location.hostname}:8001/today`)
    if (!r.ok) return null
    return await r.json()
  } catch { return null }
}

// ── 渲染函数 ──────────────────────────────────────────────

function renderOrb(cognitive) {
  const load = cognitive?.load || 'medium'
  const score = cognitive?.score ?? 0.5
  const label = cognitive?.label || '正常'

  const scorePercent = Math.round(score * 100)
  const pct = `${scorePercent}%`

  // 颜色：低=青绿，中=橙，高=红
  const color = load === 'low' ? 'var(--teal)' : load === 'high' ? 'var(--red)' : 'var(--orange)'
  document.getElementById('orbRing').style.setProperty('--pct', pct)
  document.getElementById('orbRing').style.cssText = `--pct:${pct}`
  // 更新 conic-gradient 颜色
  const ring = document.getElementById('orbRing')
  ring.style.setProperty('--pct', pct)
  ring.style.background = 'none'
  ring.style.setProperty('--color', color)
  ring.querySelector('.orb-ring')

  document.getElementById('orbScore').textContent = scorePercent
  document.getElementById('orbLabel').style.color = color
  document.getElementById('orbLabel').textContent = label

  const descMap = {
    low: '系统感知到你当前状态轻松，认知资源充裕，适合创造性工作。',
    medium: '当前处于正常工作状态，系统保持标准监控节奏。',
    high: '系统检测到较高认知负荷，建议适当休息，已推迟可选会议。',
  }
  document.getElementById('statusDesc').textContent = descMap[load] || ''
  document.getElementById('stateMode').textContent = { low: '轻松', medium: '正常', high: '繁重' }[load] || '—'
}

function renderQuadCards(s) {
  const cog = s.cognitive || {}
  const phys = s.physical || {}
  const temp = s.temporal || {}

  // 认知负荷
  const loadMap = { low: '轻松', medium: '中等', high: '繁重' }
  const loadPct = { low: 25, medium: 55, high: 85 }
  const loadColor = { low: 'var(--teal)', medium: 'var(--orange)', high: 'var(--red)' }
  const load = cog.load || 'medium'
  document.getElementById('cogLoad').textContent = loadMap[load] || '—'
  document.getElementById('cogSub').textContent = cog.current_focus ? `专注：${cog.current_focus}` : temp.time_of_day ? `${temp.time_of_day}` : '-'
  document.getElementById('cogBar').style.width = `${loadPct[load] || 50}%`
  document.getElementById('cogBar').style.background = loadColor[load] || 'var(--accent)'

  // 热量
  const remaining = phys.calorie_remaining ?? 0
  const budget = phys.daily_calorie_budget || 2000
  const consumed = budget - remaining
  const pctConsumed = Math.min(consumed / budget, 1)
  const circumference = 2 * Math.PI * 30  // r=30
  const offset = circumference * (1 - pctConsumed)
  document.getElementById('calorieDash').setAttribute('stroke-dashoffset', offset.toFixed(1))
  document.getElementById('calorieDash').setAttribute('stroke', remaining < 200 ? 'var(--red)' : remaining < 500 ? 'var(--orange)' : 'var(--teal)')
  document.getElementById('calorieNum').textContent = remaining > 0 ? remaining.toFixed(0) : '超出'

  // 情绪（推断）
  const moodScore = cog.score || 0.5
  const mood = moodScore < 0.35 ? '愉悦' : moodScore < 0.65 ? '平稳' : '紧绷'
  const moodIcon = moodScore < 0.35 ? '😊' : moodScore < 0.65 ? '😐' : '😤'
  document.getElementById('moodVal').textContent = `${moodIcon} ${mood}`
  document.getElementById('moodSub').textContent = '基于行为信号推断'

  // 当下模式
  const timeOfDay = temp.time_of_day || ''
  const timeMap = { morning: '早晨 ☀️', late_morning: '上午 ⚡', noon: '午间 🍜', afternoon: '下午 ☕', evening: '傍晚 🌆', night: '夜间 🌙' }
  const dayType = temp.day_type || 'workday'
  document.getElementById('modeVal').textContent = timeMap[timeOfDay] || '—'
  document.getElementById('modeSub').textContent = { workday: '工作日', weekend: '周末', holiday: '假日' }[dayType] || '-'
}

function renderEventTimeline(logs) {
  const container = document.getElementById('eventTimeline')
  const counter = document.getElementById('eventCount')

  if (!logs.length) {
    container.innerHTML = '<div style="font-size:13px;color:var(--text3);padding:8px 0">今日暂无事件记录</div>'
    counter.textContent = '0 件'
    return
  }

  counter.textContent = `${logs.length} 件`

  const icons = { fast: { bg: 'var(--teal)', icon: '⚡' }, semantic: { bg: 'var(--accent)', icon: '🧠' }, dynamic: { bg: 'var(--orange)', icon: '🔀' } }
  container.innerHTML = logs.map(log => {
    const mode = log.routing_mode || 'fast'
    const color = { fast: 'var(--teal)', semantic: 'var(--accent)', dynamic: 'var(--orange)' }[mode] || 'var(--teal)'
    const duration = log.duration_ms ? `${log.duration_ms}ms` : ''
    const time = log.created_at ? new Date(log.created_at).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : ''
    return `<div class="tl-item">
      <div class="tl-dot" style="background:${color}"></div>
      <div class="tl-content">
        <div class="tl-title">${log.trigger_subject || '未知事件'}</div>
        <div class="tl-meta">${time}${duration ? ' · ' + duration : ''} · ${log.flow_id || '语义路由'} · ${log.status === 'success' ? '✓' : '✗'}</div>
      </div>
    </div>`
  }).join('')
}

function renderSignals(cognitive) {
  const signals = cognitive?.signals || {}
  const container = document.getElementById('signalList')

  // 固定展示的信号项
  const items = [
    { key: 'calorie', label: '热量状态', value: cognitive?.score ?? 0.5, color: 'var(--teal)' },
    { key: 'meal_delay', label: '进餐规律', value: signals.meal_delay ? 0.8 : 0.3, color: 'var(--orange)' },
    { key: 'cognitive', label: '认知负荷', value: cognitive?.score ?? 0.5, color: 'var(--accent)' },
    { key: 'activity', label: '活动水平', value: 0.4, color: 'var(--teal)' },
  ]

  container.innerHTML = items.map(item => {
    const pct = Math.round(item.value * 100)
    return `<div class="signal-row">
      <div class="signal-name">${item.label}</div>
      <div class="signal-track"><div class="signal-fill" style="width:${pct}%;background:${item.color}"></div></div>
      <div class="signal-val" style="color:${item.color}">${pct}%</div>
    </div>`
  }).join('')
}

function renderEnergyChart(timeOfDay) {
  const hours = ['6', '8', '10', '12', '14', '16', '18', '20', '22']
  // 模拟精力曲线
  const energyPattern = [40, 65, 85, 70, 75, 80, 60, 45, 30]
  const currentHour = new Date().getHours()
  const currentIdx = hours.findIndex(h => parseInt(h) > currentHour)
  const activeIdx = currentIdx === -1 ? hours.length - 1 : currentIdx - 1

  const colors = energyPattern.map((_, i) => {
    if (i === activeIdx) return 'var(--accent)'
    if (i < activeIdx) return 'var(--teal)'
    return 'var(--s3)'
  })

  const chart = document.getElementById('energyChart')
  const label = document.getElementById('energyLabel')

  chart.innerHTML = hours.map((h, i) => {
    const height = energyPattern[i]
    const isActive = i === activeIdx
    return `<div class="energy-bar ${i <= activeIdx ? 'active' : 'past'}"
      style="height:${height}%;background:${colors[i]};opacity:${isActive ? 1 : i < activeIdx ? 0.6 : 0.25}"></div>`
  }).join('')

  label.innerHTML = `<span>${hours[0]}:00</span><span style="color:var(--accent)">${hours[activeIdx] || ''}:00 ▲</span><span>${hours[hours.length-1]}:00</span>`
}

function renderCalorieDetail(calorieSummary) {
  const card = document.getElementById('calorieCard')
  const detail = document.getElementById('calorieDetail')
  const badge = document.getElementById('calorieBadge')

  if (!calorieSummary) {
    detail.innerHTML = '<div style="font-size:13px;color:var(--text3)">暂无饮食数据</div>'
    return
  }

  const total = calorieSummary.total_calories || 0
  const budget = calorieSummary.budget || 2000
  const meals = calorieSummary.meals || []

  badge.textContent = `${total} / ${budget} kcal`

  const mealTypeMap = { breakfast: '早餐', lunch: '午餐', dinner: '晚餐', snack: '加餐' }
  detail.innerHTML = meals.slice(0, 5).map(m => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:14px">${m.source === 'auto' ? '📷' : '✏️'}</span>
        <div>
          <div style="font-size:13px;font-weight:600">${m.food_name}</div>
          <div style="font-size:11px;color:var(--text3)">${mealTypeMap[m.meal_type] || ''}</div>
        </div>
      </div>
      <div style="font-size:14px;font-weight:700;font-family:'Outfit',sans-serif;color:var(--teal)">${m.calories} kcal</div>
    </div>
  `).join('') || '<div style="font-size:13px;color:var(--text3);padding:8px 0">今日暂无饮食记录</div>'
}

function renderTravelCard(travel) {
  const card = document.getElementById('travelCard')
  if (!travel?.is_traveling) {
    card.style.display = 'none'
    return
  }
  card.style.display = 'block'
  const trip = travel.current_trip || {}
  document.getElementById('travelDetail').innerHTML = `
    <div style="font-size:15px;font-weight:700;margin-bottom:6px">${trip.name || '旅行中'}</div>
    <div style="font-size:13px;color:var(--text2)">开始：${trip.start_date || ''}</div>
    <div style="font-size:13px;color:var(--text2);margin-top:2px">已记录 ${trip.moments_count || 0} 个时刻</div>
  `
}

function renderSuggestions(s) {
  const container = document.getElementById('suggestionList')
  const cog = s.cognitive || {}
  const phys = s.physical || {}
  const load = cog.load || 'medium'

  const suggestions = []

  if (load === 'high') {
    suggestions.push({ icon: '😌', bg: 'var(--teal-s)', text: '检测到较高认知负荷，建议暂停 15 分钟，闭眼休息或短暂散步。', action: '查看日程建议' })
  }
  if ((phys.calorie_remaining ?? 2000) < 300) {
    suggestions.push({ icon: '🍵', bg: 'var(--orange-s)', text: '今日热量预算接近上限，晚餐建议选择低热量食物。' })
  }
  if (!phys.last_meal || (() => { try { return (Date.now() - new Date(phys.last_meal).getTime()) > 5 * 3600 * 1000 } catch { return false } })()) {
    suggestions.push({ icon: '🕐', bg: 'var(--orange-s)', text: '距离上次进餐超过 5 小时，注意补充能量。' })
  }
  if (load === 'low') {
    suggestions.push({ icon: '🚀', bg: 'var(--accent-s)', text: '当前状态轻松，是处理深度工作和创造性任务的好时机。' })
  }
  if (!suggestions.length) {
    suggestions.push({ icon: '✨', bg: 'var(--teal-s)', text: '状态良好，系统在后台静默运行，无特别建议。' })
  }

  container.innerHTML = suggestions.map(s => `
    <div class="suggest-item">
      <div class="suggest-icon" style="background:${s.bg}">${s.icon}</div>
      <div>
        <div class="suggest-text">${s.text}</div>
        ${s.action ? `<div class="suggest-action">${s.action} →</div>` : ''}
      </div>
    </div>
  `).join('')
}

function renderTonightPlan() {
  const container = document.getElementById('tonightPlan')
  const hour = new Date().getHours()

  // 根据时段生成不同的今夜计划
  const plans = [
    { icon: '📷', text: '整理今日新照片，完成 AI 分类和归档' },
    { icon: '🧠', text: '巩固知识条目，生成跨内容关联' },
    { icon: '📊', text: '更新健康趋势数据，分析本周规律' },
    { icon: '💾', text: '将工作记忆写入长期记忆图谱' },
  ]

  container.innerHTML = plans.map((p, i) => `
    <div class="plan-item">
      <span class="plan-icon">${p.icon}</span>
      <span class="plan-text">${p.text}</span>
      <span class="plan-time">${String(22 + i).padStart(2,'0')}:00</span>
    </div>
  `).join('')
}

// ── 主更新逻辑 ─────────────────────────────────────────────

async function refresh() {
  if (refreshing) return
  refreshing = true
  const btn = document.getElementById('refreshBtn')
  btn.querySelector('svg').classList.add('spin')

  try {
    const [userState, logs, calorieSummary] = await Promise.all([
      fetchState(),
      fetchExecLogs(),
      fetchCalorieSummary(),
    ])

    if (userState) {
      state = userState

      renderOrb(userState.cognitive)
      renderQuadCards(userState)
      renderSignals(userState.cognitive)
      renderTravelCard(userState.travel)
      renderSuggestions(userState)
    }

    renderEventTimeline(logs)
    renderEnergyChart(userState?.temporal?.time_of_day)
    renderCalorieDetail(calorieSummary)
    renderTonightPlan()

    const now = new Date()
    document.getElementById('lastUpdate').innerHTML =
      `<span class="dot"></span>更新于 ${now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`

  } catch (e) {
    console.error('refresh failed:', e)
    document.getElementById('lastUpdate').innerHTML = `<span style="color:var(--red)">●</span> 连接失败`
  } finally {
    refreshing = false
    btn.querySelector('svg').classList.remove('spin')
  }
}

// 初始加载 + 定时刷新（每 15 秒）
refresh()
setInterval(refresh, 15000)
</script>
