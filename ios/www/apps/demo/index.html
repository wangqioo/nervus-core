<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>能力测试</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f2f2f7; padding: 16px; }
    h2 { font-size: 20px; margin-bottom: 16px; }

    .section { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .section h3 { font-size: 13px; color: #8e8e93; text-transform: uppercase; margin-bottom: 12px; }

    button {
      display: block; width: 100%;
      background: #007aff; color: #fff;
      border: none; border-radius: 10px;
      padding: 12px; font-size: 15px;
      cursor: pointer; margin-bottom: 8px;
    }
    button:last-child { margin-bottom: 0; }
    button:active { opacity: 0.7; }

    .result {
      margin-top: 10px; padding: 10px;
      background: #f2f2f7; border-radius: 8px;
      font-size: 13px; color: #333;
      word-break: break-all;
      min-height: 36px;
    }
    img.preview { max-width: 100%; border-radius: 8px; margin-top: 10px; }
  </style>
</head>
<body>
<h2>原生能力测试</h2>

<!-- 相册 -->
<div class="section">
  <h3>相机 / 相册</h3>
  <button onclick="testPhoto()">从相册选择照片</button>
  <button onclick="testCamera()">拍照</button>
  <div class="result" id="photo-result">等待操作…</div>
  <img id="photo-preview" class="preview" style="display:none" />
</div>

<!-- 定位 -->
<div class="section">
  <h3>定位</h3>
  <button onclick="testLocation()">获取当前位置</button>
  <div class="result" id="location-result">等待操作…</div>
</div>

<!-- 麦克风 -->
<div class="section">
  <h3>麦克风</h3>
  <button id="mic-btn" onclick="testMic()">开始录音</button>
  <div class="result" id="mic-result">等待操作…</div>
</div>

<!-- 通知 -->
<div class="section">
  <h3>推送通知</h3>
  <button onclick="testNotification()">请求通知权限</button>
  <div class="result" id="notif-result">等待操作…</div>
</div>

<!-- 触感 -->
<div class="section">
  <h3>触感反馈</h3>
  <button onclick="parent.Bridge?.vibrate()">触感震动</button>
</div>

<script>
  // 子页面通过 parent.Bridge 访问主壳提供的 Bridge
  const B = parent.Bridge;

  async function testPhoto() {
    try {
      const url = await B.pickPhoto();
      document.getElementById('photo-result').textContent = url;
      const img = document.getElementById('photo-preview');
      img.src = url; img.style.display = 'block';
    } catch(e) {
      document.getElementById('photo-result').textContent = '错误: ' + e.message;
    }
  }

  async function testCamera() {
    try {
      const url = await B.takePhoto();
      document.getElementById('photo-result').textContent = url;
      const img = document.getElementById('photo-preview');
      img.src = url; img.style.display = 'block';
    } catch(e) {
      document.getElementById('photo-result').textContent = '错误: ' + e.message;
    }
  }

  async function testLocation() {
    const el = document.getElementById('location-result');
    el.textContent = '获取中…';
    try {
      const loc = await B.getLocation();
      el.textContent = `纬度: ${loc.lat.toFixed(6)}\n经度: ${loc.lng.toFixed(6)}\n精度: ${loc.accuracy.toFixed(0)}m`;
    } catch(e) {
      el.textContent = '错误: ' + e.message;
    }
  }

  let mediaRecorder, audioChunks = [], recording = false;
  async function testMic() {
    const el = document.getElementById('mic-result');
    const btn = document.getElementById('mic-btn');
    if (!recording) {
      try {
        const stream = await B.getMicStream();
        // iOS 只支持 audio/mp4，优先使用，fallback 到浏览器默认
        const mimeType = MediaRecorder.isTypeSupported('audio/mp4')
          ? 'audio/mp4'
          : MediaRecorder.isTypeSupported('audio/webm')
          ? 'audio/webm'
          : '';
        mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = () => {
          const type = mediaRecorder.mimeType || 'audio/mp4';
          const blob = new Blob(audioChunks, { type });
          const url = URL.createObjectURL(blob);
          el.innerHTML = `录音完成 (${type})<audio controls src="${url}" style="display:block;width:100%;margin-top:6px"></audio>`;
        };
        mediaRecorder.start();
        recording = true;
        btn.textContent = '停止录音';
        btn.style.background = '#ff3b30';
        el.textContent = '录音中…';
      } catch(e) {
        el.textContent = '错误: ' + e.message;
      }
    } else {
      mediaRecorder.stop();
      recording = false;
      btn.textContent = '开始录音';
      btn.style.background = '#007aff';
    }
  }

  async function testNotification() {
    const el = document.getElementById('notif-result');
    try {
      const ok = await B.requestNotificationPermission();
      el.textContent = ok ? '通知权限已获取' : '用户拒绝了通知权限';
    } catch(e) {
      el.textContent = '错误: ' + e.message;
    }
  }
</script>
</body>
</html>
