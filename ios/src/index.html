<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Nervus</title>
<style>
/* ── 设计系统 ── */
:root {
  --bg:#07070E; --s1:rgba(255,255,255,.04); --s2:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.09); --text:#EEEEF8;
  --text2:rgba(238,238,248,.55); --text3:rgba(238,238,248,.28);
  --accent:#00D4AA; --accent-dim:rgba(0,212,170,.15);
  --warn:#FF6B35; --warn-dim:rgba(255,107,53,.15);
  --r:16px; --r-sm:10px;
  --tab-h:calc(56px + env(safe-area-inset-bottom,0px));
}
@media(prefers-color-scheme:light){
  :root{
    --bg:#F2F2F7; --s1:rgba(0,0,0,.03); --s2:#fff;
    --border:rgba(0,0,0,.07); --text:#1C1C1E;
    --text2:rgba(28,28,30,.55); --text3:rgba(28,28,30,.28);
    --accent:#00A882; --accent-dim:rgba(0,168,130,.1);
  }
}

/* ── 基础重置 ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
*{scrollbar-width:none}*::-webkit-scrollbar{display:none}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'PingFang SC',-apple-system,BlinkMacSystemFont,sans-serif;
  overflow:hidden;user-select:none}

/* ── 主骨架 ── */
#app{height:100%;display:flex;flex-direction:column}

/* ── 顶部栏 ── */
#top-bar{
  flex-shrink:0;
  padding:calc(env(safe-area-inset-top,0px) + 12px) 18px 12px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  background:var(--bg);z-index:10;
}
.logo{font-size:19px;font-weight:800;letter-spacing:-.5px}
.logo span{color:var(--accent)}
#conn-indicator{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
#conn-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:background .4s}
#conn-dot.connected{background:var(--accent);box-shadow:0 0 6px var(--accent)}
#conn-dot.searching{background:#f5a623;animation:blink 1s infinite}
#conn-dot.error{background:var(--warn)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── 页面容器 ── */
#pages{flex:1;overflow:hidden;position:relative}
.page{
  position:absolute;inset:0;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:14px 16px calc(var(--tab-h) + 12px);
  opacity:0;pointer-events:none;
  transform:translateY(8px);
  transition:opacity .2s,transform .2s;
}
.page.active{opacity:1;pointer-events:auto;transform:none}

/* 对话页特殊布局 */
#page-chat{
  padding:0;overflow:hidden;
  display:flex;flex-direction:column;
  bottom:var(--tab-h);
}

/* ── 底部标签栏 ── */
#tab-bar{
  position:fixed;bottom:0;left:0;right:0;
  height:var(--tab-h);
  background:rgba(7,7,14,.92);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex;padding-bottom:env(safe-area-inset-bottom,0px);
  z-index:100;
}
@media(prefers-color-scheme:light){#tab-bar{background:rgba(242,242,247,.94)}}
.tab-btn{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;
  background:none;border:none;color:var(--text3);
  font-size:10px;font-weight:500;cursor:pointer;
  transition:color .15s;padding-top:8px;
}
.tab-btn.active{color:var(--accent)}
.tab-btn svg{width:22px;height:22px;stroke-width:1.8;fill:none;stroke:currentColor}

/* ── 通用卡片 ── */
.card{
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r);padding:14px 16px;margin-bottom:10px;
}
.card-label{
  font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:.6px;color:var(--text3);margin-bottom:10px;
}

/* ── 空状态 ── */
.empty{text-align:center;padding:32px 20px}
.empty-icon{font-size:30px;margin-bottom:8px}
.empty-text{font-size:13px;color:var(--text2)}

/* ── 主页 ── */
.home-greeting{font-size:22px;font-weight:700;letter-spacing:-.3px;margin-bottom:2px}
.home-date{font-size:13px;color:var(--text2);margin-bottom:14px}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stat-tile{
  background:var(--s2);border:1px solid var(--border);
  border-radius:14px;padding:13px 12px;
  display:flex;flex-direction:column;gap:4px;
}
.stat-icon{font-size:20px}
.stat-val{font-size:20px;font-weight:700}
.stat-label{font-size:11px;color:var(--text2)}
.activity-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 0;border-bottom:1px solid var(--border);
}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0}
.activity-text{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.activity-time{font-size:11px;color:var(--text3);flex-shrink:0}

/* ── 对话页 ── */
.chat-messages{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:14px 16px 8px;
}
.chat-input-wrap{
  flex-shrink:0;
  padding:8px 12px calc(env(safe-area-inset-bottom,0px) + 10px);
  border-top:1px solid var(--border);
  background:var(--bg);
  display:flex;align-items:flex-end;gap:8px;
}
.chat-input{
  flex:1;background:var(--s2);border:1px solid var(--border);
  border-radius:20px;color:var(--text);font-size:15px;
  font-family:inherit;padding:10px 14px;outline:none;
  resize:none;max-height:120px;line-height:1.4;
}
.chat-input::placeholder{color:var(--text3)}
.chat-send-btn{
  width:38px;height:38px;border-radius:50%;
  background:var(--accent);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:opacity .15s;
}
.chat-send-btn:active{opacity:.7}
.chat-send-btn svg{width:16px;height:16px;fill:none;stroke:#000;stroke-width:2.5}
.msg{display:flex;margin-bottom:10px}
.msg.user{justify-content:flex-end}
.msg-bubble{
  max-width:76%;padding:10px 13px;border-radius:18px;
  font-size:14px;line-height:1.5;word-break:break-word;
}
.msg.ai .msg-bubble{
  background:var(--s2);border:1px solid var(--border);
  border-bottom-left-radius:5px;
}
.msg.user .msg-bubble{
  background:var(--accent);color:#000;font-weight:500;
  border-bottom-right-radius:5px;
}
.msg-typing{display:flex;gap:4px;padding:4px 0}
.msg-typing span{
  width:6px;height:6px;border-radius:50%;background:var(--text3);
  animation:typing .9s infinite;
}
.msg-typing span:nth-child(2){animation-delay:.15s}
.msg-typing span:nth-child(3){animation-delay:.3s}
@keyframes typing{0%,80%,100%{transform:scale(.8);opacity:.5}40%{transform:scale(1);opacity:1}}

/* ── 文件页 ── */
.search-bar{
  display:flex;align-items:center;gap:8px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:12px;padding:0 12px;margin-bottom:12px;
}
.search-bar input{
  flex:1;background:none;border:none;color:var(--text);
  font-size:15px;padding:12px 0;outline:none;font-family:inherit;
}
.search-bar input::placeholder{color:var(--text3)}
.search-bar svg{width:16px;height:16px;stroke:var(--text3);fill:none;flex-shrink:0}
.file-item{
  display:flex;align-items:center;gap:11px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:11px 13px;margin-bottom:8px;cursor:pointer;
  transition:opacity .12s;
}
.file-item:active{opacity:.7}
.file-icon{
  width:36px;height:36px;border-radius:8px;
  background:var(--accent-dim);color:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.file-info{flex:1;min-width:0}
.file-name{font-size:14px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-meta{font-size:11px;color:var(--text2)}
.file-badge{
  font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;
  background:var(--accent-dim);color:var(--accent);flex-shrink:0;
}

/* ── 感知页 ── */
.orb-wrap{display:flex;justify-content:center;margin:8px 0 14px}
.sense-orb{
  width:110px;height:110px;border-radius:50%;
  background:conic-gradient(var(--accent) 0deg,var(--s2) 0deg);
  display:flex;align-items:center;justify-content:center;position:relative;
}
.sense-orb::before{content:'';position:absolute;inset:8px;border-radius:50%;background:var(--bg)}
.orb-inner{position:relative;z-index:1;text-align:center}
.orb-val{font-size:24px;font-weight:700;line-height:1}
.orb-lbl{font-size:11px;color:var(--text2)}
.orb-sub{font-size:11px;color:var(--text2);text-align:center;margin-top:6px}
.state-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.state-item{
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:11px 12px;
}
.state-item-lbl{font-size:11px;color:var(--text2);margin-bottom:4px}
.state-item-val{font-size:15px;font-weight:600}
.suggest-row{
  font-size:13px;padding:8px 0;
  border-bottom:1px solid var(--border);line-height:1.4;
}
.suggest-row:last-child{border-bottom:none}

/* ── 应用页 ── */
.apps-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.app-tile{
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r);padding:18px 14px 14px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  cursor:pointer;transition:transform .12s,opacity .12s;
}
.app-tile:active{transform:scale(.95);opacity:.8}
.app-tile-icon{font-size:34px}
.app-tile-name{font-size:13px;font-weight:600;text-align:center;line-height:1.3}
.app-tile-desc{font-size:11px;color:var(--text2);text-align:center}

/* ── 全屏应用面板 ── */
#panel{
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;background:var(--bg);
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
}
#panel.open{transform:none}
#panel-nav{
  flex-shrink:0;
  padding:calc(env(safe-area-inset-top,0px) + 10px) 14px 10px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);background:var(--bg);
}
#panel-back{
  display:flex;align-items:center;gap:4px;
  font-size:15px;color:var(--accent);
  background:none;border:none;cursor:pointer;padding:4px 8px;
}
#panel-back svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2.2}
#panel-title{font-size:16px;font-weight:600;flex:1}
#panel-frame{flex:1;border:none;width:100%}

/* ── 连接中遮罩 ── */
#conn-overlay{
  position:fixed;inset:0;z-index:300;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .4s;
}
#conn-overlay.hidden{opacity:0;pointer-events:none}
.conn-logo{font-size:46px;font-weight:800;letter-spacing:-2px;margin-bottom:6px}
.conn-logo span{color:var(--accent)}
.conn-sub{color:var(--text2);font-size:13px;margin-bottom:32px}
.conn-spinner{
  width:28px;height:28px;border:2px solid var(--s2);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.conn-hint{font-size:12px;color:var(--text3);margin-top:14px;text-align:center;max-width:220px;line-height:1.5}
</style>
</head>
<body>

<!-- 连接中遮罩 -->
<div id="conn-overlay">
  <div class="conn-logo">Nerv<span>us</span></div>
  <div class="conn-sub">本地 AI 神经系统</div>
  <div class="conn-spinner"></div>
  <div class="conn-hint">正在局域网搜索 Nervus 服务器...</div>
</div>

<div id="app">
  <!-- 顶部栏 -->
  <div id="top-bar">
    <div class="logo">Nerv<span>us</span></div>
    <div id="conn-indicator">
      <div id="conn-dot" class="searching"></div>
      <span id="conn-label">搜索中</span>
    </div>
  </div>

  <!-- 页面容器 -->
  <div id="pages">

    <!-- ① 主页 -->
    <div class="page active" id="page-home">
      <div class="home-greeting" id="home-greeting">你好</div>
      <div class="home-date" id="home-date"></div>

      <div class="stats-row">
        <div class="stat-tile">
          <div class="stat-icon">🔥</div>
          <div class="stat-val" id="home-calories">--</div>
          <div class="stat-label">今日热量 kcal</div>
        </div>
        <div class="stat-tile">
          <div class="stat-icon">📅</div>
          <div class="stat-val" id="home-events">--</div>
          <div class="stat-label">今日日程</div>
        </div>
      </div>

      <div class="card">
        <div class="card-label">最近动态</div>
        <div id="home-activity">
          <div class="empty"><div class="empty-icon">◎</div><div class="empty-text">加载中...</div></div>
        </div>
      </div>
    </div>

    <!-- ② 对话页 -->
    <div class="page" id="page-chat">
      <div class="chat-messages" id="chat-messages">
        <div class="msg ai">
          <div class="msg-bubble">你好！我是 Nervus AI。有什么可以帮你的吗？</div>
        </div>
      </div>
      <div class="chat-input-wrap">
        <textarea class="chat-input" id="chat-input" placeholder="发送消息..." rows="1"
          oninput="autoResize(this)" onkeydown="chatKeyDown(event)"></textarea>
        <button class="chat-send-btn" onclick="sendChat()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>

    <!-- ③ 文件页 -->
    <div class="page" id="page-files">
      <div class="search-bar">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
        <input type="search" id="files-search" placeholder="搜索文件和知识库..."
          oninput="onFilesSearch(this.value)" inputmode="search">
      </div>
      <div id="files-list">
        <div class="empty"><div class="empty-icon">📂</div><div class="empty-text">加载中...</div></div>
      </div>
    </div>

    <!-- ④ 感知页 -->
    <div class="page" id="page-sense">
      <div class="orb-wrap">
        <div>
          <div class="sense-orb" id="sense-orb">
            <div class="orb-inner">
              <div class="orb-val" id="orb-val">--</div>
              <div class="orb-lbl">负荷</div>
            </div>
          </div>
          <div class="orb-sub" id="orb-sub">认知负荷</div>
        </div>
      </div>

      <div class="state-grid">
        <div class="state-item"><div class="state-item-lbl">活动状态</div><div class="state-item-val" id="s-activity">--</div></div>
        <div class="state-item"><div class="state-item-lbl">专注时长</div><div class="state-item-val" id="s-focus">--</div></div>
        <div class="state-item"><div class="state-item-lbl">今日热量</div><div class="state-item-val" id="s-calories">--</div></div>
        <div class="state-item"><div class="state-item-lbl">下个日程</div><div class="state-item-val" id="s-event">--</div></div>
      </div>

      <div class="card">
        <div class="card-label">AI 建议</div>
        <div id="sense-suggestions">
          <div class="empty"><div class="empty-icon">◎</div><div class="empty-text">加载中...</div></div>
        </div>
      </div>
      <div class="card">
        <div class="card-label">最近事件</div>
        <div id="sense-events">
          <div class="empty"><div class="empty-icon">◎</div><div class="empty-text">暂无事件</div></div>
        </div>
      </div>
    </div>

    <!-- ⑤ 应用页 -->
    <div class="page" id="page-apps">
      <div class="apps-grid" id="apps-grid">
        <div class="empty" style="grid-column:1/-1">
          <div class="empty-icon">📱</div><div class="empty-text">加载应用中...</div>
        </div>
      </div>
    </div>

  </div><!-- /#pages -->

  <!-- 标签栏 -->
  <div id="tab-bar">
    <button class="tab-btn active" onclick="switchTab('home',this)">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      主页
    </button>
    <button class="tab-btn" onclick="switchTab('chat',this)">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      对话
    </button>
    <button class="tab-btn" onclick="switchTab('files',this)">
      <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      文件
    </button>
    <button class="tab-btn" onclick="switchTab('sense',this)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
      感知
    </button>
    <button class="tab-btn" onclick="switchTab('apps',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
      应用
    </button>
  </div>
</div><!-- /#app -->

<!-- 全屏应用面板 -->
<div id="panel">
  <div id="panel-nav">
    <button id="panel-back" onclick="closePanel()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      返回
    </button>
    <span id="panel-title"></span>
  </div>
  <iframe id="panel-frame" allow="camera; microphone; geolocation"></iframe>
</div>

<!-- Capacitor 运行时 -->
<script src="capacitor.js" onerror="void 0"></script>
<script src="js/nervus-bridge.js" type="module" onerror="void 0"></script>

<script>
// ── 状态 ───────────────────────────────────────────────────
let serverBase = null;
let currentTab = 'home';
let pollTimer = null;
let chatHistory = [];

// ── 标签切换 ───────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
  btn.classList.add('active');
  currentTab = name;
  if (name === 'home')  loadHome();
  if (name === 'files') loadFiles();
  if (name === 'sense') loadSense();
  if (name === 'apps')  loadApps();
}

// ── 连接管理 ───────────────────────────────────────────────
function setConnected(base) {
  serverBase = base;
  document.getElementById('conn-dot').className = 'connected';
  document.getElementById('conn-label').textContent = 'nervus.local';
  document.getElementById('conn-overlay').classList.add('hidden');
  loadHome();
  loadApps();
  startPolling();
}
function setDisconnected() {
  document.getElementById('conn-dot').className = 'error';
  document.getElementById('conn-label').textContent = '未连接';
  stopPolling();
}

// ── API 工具 ───────────────────────────────────────────────
async function api(path, opts = {}) {
  if (!serverBase) throw new Error('未连接');
  const r = await fetch(serverBase + path, {
    headers: { 'Content-Type': 'application/json' },
    signal: AbortSignal.timeout(8000), ...opts,
  });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}
async function appApi(port, path, opts = {}) {
  if (!serverBase) throw new Error('未连接');
  const base = serverBase.replace(/:\d+$/, `:${port}`);
  const r = await fetch(base + path, {
    headers: { 'Content-Type': 'application/json' },
    signal: AbortSignal.timeout(8000), ...opts,
  });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

// ── 主页 ───────────────────────────────────────────────────
async function loadHome() {
  const h = new Date().getHours();
  document.getElementById('home-greeting').textContent =
    h < 6 ? '深夜好' : h < 12 ? '早上好' : h < 18 ? '下午好' : '晚上好';
  const now = new Date();
  const wk = ['周日','周一','周二','周三','周四','周五','周六'];
  document.getElementById('home-date').textContent =
    `${now.getMonth()+1}月${now.getDate()}日 ${wk[now.getDay()]}`;

  const [calorie, calendar, logs] = await Promise.allSettled([
    appApi(8001, '/today'),
    appApi(8011, '/events/upcoming?hours=24'),
    api('/logs?limit=8'),
  ]);
  document.getElementById('home-calories').textContent =
    calorie.value?.total_calories ?? '--';
  document.getElementById('home-events').textContent =
    calendar.value?.events?.length ?? '--';
  renderActivity(logs.value?.logs || []);
}
function renderActivity(logs) {
  const el = document.getElementById('home-activity');
  if (!logs.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">◎</div><div class="empty-text">暂无动态</div></div>';
    return;
  }
  el.innerHTML = logs.map(log => `
    <div class="activity-item">
      <div class="activity-dot"></div>
      <div class="activity-text">${esc(log.flow_id || log.subject || '事件')}</div>
      <div class="activity-time">${fmtTime(log.created_at)}</div>
    </div>`).join('');
}

// ── 对话页 ─────────────────────────────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function chatKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}
async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  autoResize(input);
  appendMsg('user', text);
  const typingId = appendTyping();
  try {
    const data = await api('/ai/chat', {
      method: 'POST',
      body: JSON.stringify({ message: text, history: chatHistory.slice(-8) }),
    });
    const reply = data.reply || data.message || '已收到';
    removeTyping(typingId);
    appendMsg('ai', reply);
    chatHistory.push({ role: 'user', content: text });
    chatHistory.push({ role: 'assistant', content: reply });
  } catch {
    removeTyping(typingId);
    appendMsg('ai', '抱歉，暂时无法连接 AI，请稍后重试。');
  }
}
function appendMsg(role, text) {
  const el = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="msg-bubble">${esc(text).replace(/\n/g,'<br>')}</div>`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}
function appendTyping() {
  const el = document.getElementById('chat-messages');
  const id = 'typing-' + Date.now();
  const div = document.createElement('div');
  div.className = 'msg ai'; div.id = id;
  div.innerHTML = `<div class="msg-bubble"><div class="msg-typing"><span></span><span></span><span></span></div></div>`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
  return id;
}
function removeTyping(id) {
  document.getElementById(id)?.remove();
}

// ── 文件页 ─────────────────────────────────────────────────
let filesTimer = null;
async function loadFiles() {
  const el = document.getElementById('files-list');
  try {
    const data = await appApi(8003, '/items?limit=30');
    renderFiles(data.items || data.results || []);
  } catch {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📂</div><div class="empty-text">无法加载，请检查网络</div></div>';
  }
}
function onFilesSearch(q) {
  clearTimeout(filesTimer);
  if (!q.trim()) { loadFiles(); return; }
  filesTimer = setTimeout(() => searchFiles(q), 400);
}
async function searchFiles(q) {
  const el = document.getElementById('files-list');
  el.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">搜索中...</div></div>';
  try {
    const data = await appApi(8003, '/search', {
      method: 'POST', body: JSON.stringify({ query: q, limit: 20 }),
    });
    renderFiles(data.results || data.items || []);
  } catch {
    el.innerHTML = '<div class="empty"><div class="empty-icon">◎</div><div class="empty-text">搜索失败</div></div>';
  }
}
const FILE_ICONS = { pdf:'📄', image:'🖼️', video:'🎥', audio:'🎵', note:'📝', meeting:'🎤', url:'🔗', bookmark:'🔖' };
function renderFiles(items) {
  const el = document.getElementById('files-list');
  if (!items.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📂</div><div class="empty-text">暂无文件</div></div>';
    return;
  }
  el.innerHTML = items.map(item => {
    const type = item.item_type || item.type || 'note';
    return `
      <div class="file-item">
        <div class="file-icon">${FILE_ICONS[type] || '📄'}</div>
        <div class="file-info">
          <div class="file-name">${esc(item.title || item.name || '无标题')}</div>
          <div class="file-meta">${fmtTime(item.updated_at || item.created_at)}</div>
        </div>
        <div class="file-badge">${esc(type)}</div>
      </div>`;
  }).join('');
}

// ── 感知页 ─────────────────────────────────────────────────
async function loadSense() {
  const [state, calorie, calendar, logs] = await Promise.allSettled([
    appApi(8005, '/user-state'),
    appApi(8001, '/today'),
    appApi(8011, '/events/upcoming?hours=8'),
    api('/logs?limit=5'),
  ]);
  const cogLoad = state.value?.cognitive?.load;
  const loadMap = { low: 20, medium: 50, high: 80 };
  const pct = loadMap[cogLoad] ?? 0;
  const color = cogLoad === 'high' ? '#FF6B35' : 'var(--accent)';
  document.getElementById('sense-orb').style.background =
    `conic-gradient(${color} ${pct * 3.6}deg,var(--s2) 0deg)`;
  document.getElementById('orb-val').textContent = pct ? `${pct}%` : '--';
  document.getElementById('orb-sub').textContent =
    cogLoad ? ({ low:'轻松', medium:'专注', high:'高负荷' })[cogLoad] : '认知负荷';

  const phys = state.value?.physical || {};
  const temp = state.value?.temporal || {};
  document.getElementById('s-activity').textContent = phys.activity || '--';
  document.getElementById('s-focus').textContent = temp.focus_duration || '--';
  document.getElementById('s-calories').textContent =
    calorie.value ? `${calorie.value.total_calories ?? 0}` : '--';
  const ev = calendar.value?.events?.[0];
  document.getElementById('s-event').textContent = ev ? ev.title.slice(0, 8) : '--';

  const sug = state.value?.suggestions || [];
  const sugEl = document.getElementById('sense-suggestions');
  sugEl.innerHTML = sug.length
    ? sug.map(s => `<div class="suggest-row">${esc(s.message || s)}</div>`).join('')
    : '<div class="empty-text" style="font-size:13px;color:var(--text2);padding:4px 0">暂无建议</div>';

  const evLogs = logs.value?.logs || [];
  const evEl = document.getElementById('sense-events');
  evEl.innerHTML = evLogs.length
    ? evLogs.map(l => `
        <div class="activity-item">
          <div class="activity-dot"></div>
          <div class="activity-text">${esc(l.flow_id || l.subject || '事件')}</div>
          <div class="activity-time">${fmtTime(l.created_at)}</div>
        </div>`).join('')
    : '<div class="empty"><div class="empty-icon">◎</div><div class="empty-text">暂无事件</div></div>';
}

// ── 应用页 ─────────────────────────────────────────────────
const APP_ICONS = {
  'calorie-tracker':'🍎','file-manager':'📁','knowledge-base':'📚',
  'meeting-notes':'🎤','personal-notes':'📝','reminder':'⏰',
  'calendar':'📅','rss-reader':'📰','pdf-extractor':'📄',
  'photo-scanner':'📷','status-sense':'📊','video-transcriber':'🎥',
  'workflow-viewer':'⚡','sense':'🧠','model-manager':'🤖',
  'life-memory':'💭','task-manager':'✅',
};
async function loadApps() {
  const el = document.getElementById('apps-grid');
  try {
    const data = await api('/apps');
    const apps = (data.apps || data || []).filter(a =>
      a.app_id !== 'nervus-system' && a.app_id !== 'nervus-core');
    if (!apps.length) {
      el.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📱</div><div class="empty-text">暂无应用</div></div>';
      return;
    }
    el.innerHTML = apps.map(app => {
      const id = app.app_id || app.id || '';
      const name = app.manifest?.name || app.name || id;
      const desc = (app.manifest?.description || '').slice(0, 18);
      const icon = APP_ICONS[id] || '📦';
      const url = app.endpoint_url || '';
      return `
        <div class="app-tile" onclick="openApp(${JSON.stringify(name)},${JSON.stringify(url)})">
          <div class="app-tile-icon">${icon}</div>
          <div class="app-tile-name">${esc(name)}</div>
          ${desc ? `<div class="app-tile-desc">${esc(desc)}</div>` : ''}
        </div>`;
    }).join('');
  } catch {
    el.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📱</div><div class="empty-text">加载失败</div></div>';
  }
}
function openApp(name, url) {
  if (!url) return;
  document.getElementById('panel-title').textContent = name;
  document.getElementById('panel-frame').src = url;
  document.getElementById('panel').classList.add('open');
}
function closePanel() {
  document.getElementById('panel').classList.remove('open');
  setTimeout(() => { document.getElementById('panel-frame').src = ''; }, 300);
}

// ── 轮询 ───────────────────────────────────────────────────
function startPolling() {
  pollTimer = setInterval(() => {
    if (currentTab === 'home')  loadHome();
    if (currentTab === 'sense') loadSense();
  }, 30000);
}
function stopPolling() { clearInterval(pollTimer); }

// ── 工具 ───────────────────────────────────────────────────
function esc(s) {
  return (s||'').toString()
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso), diff = Date.now() - d;
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return `${Math.floor(diff/60000)}分钟前`;
    if (diff < 86400000) return `${Math.floor(diff/3600000)}小时前`;
    return `${d.getMonth()+1}/${d.getDate()}`;
  } catch { return ''; }
}

// ── 初始化 ─────────────────────────────────────────────────
async function initApp() {
  if (window.Nervus) {
    try {
      const state = await window.Nervus.init({ discoveryTimeout: 5000 });
      setConnected(state.serverBase);
    } catch { tryDirectConnect(); }
    window.addEventListener('nervus:connected', e => setConnected(e.detail.serverBase));
    window.addEventListener('nervus:disconnected', setDisconnected);
  } else {
    tryDirectConnect();
  }
}
async function tryDirectConnect() {
  const candidates = [
    'https://nervus.local',
    'http://nervus.local:8090',
    'http://localhost:8090',
  ];
  for (const base of candidates) {
    try {
      const r = await fetch(`${base}/health`, { signal: AbortSignal.timeout(3000) });
      if (r.ok) { setConnected(base); return; }
    } catch {}
  }
  const overlay = document.getElementById('conn-overlay');
  document.getElementById('conn-dot').className = 'error';
  document.getElementById('conn-label').textContent = '未找到';
  overlay.querySelector('.conn-hint').textContent = '请确保已连接到 Nervus 所在的 Wi-Fi 网络';
  overlay.querySelector('.conn-spinner').style.display = 'none';
}

document.addEventListener('DOMContentLoaded', initApp);
document.addEventListener('deviceready', initApp, { once: true });
</script>
