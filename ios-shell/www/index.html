<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>WebShell</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, sans-serif;
      background: #f2f2f7;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* 顶部导航 */
    .nav {
      background: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e5e5ea;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav h1 { font-size: 17px; font-weight: 600; }
    .nav-btn {
      background: none; border: none;
      font-size: 24px; cursor: pointer;
      padding: 0 4px; line-height: 1;
    }

    /* 卡片网格 */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
    }
    .card:active { transform: scale(0.96); box-shadow: none; }
    .card .icon { font-size: 36px; }
    .card .label { font-size: 14px; font-weight: 500; text-align: center; }
    .card .desc { font-size: 11px; color: #8e8e93; text-align: center; }

    /* 编辑模式删除按钮 */
    .card .delete-btn {
      display: none;
      position: absolute;
      top: -6px; left: -6px;
      width: 22px; height: 22px;
      background: #ff3b30;
      color: #fff;
      border-radius: 50%;
      border: none;
      font-size: 14px;
      line-height: 22px;
      text-align: center;
      cursor: pointer;
      z-index: 10;
    }
    body.editing .card .delete-btn { display: block; }
    body.editing .card { animation: wiggle 0.3s ease infinite alternate; }
    @keyframes wiggle {
      from { transform: rotate(-1deg); }
      to   { transform: rotate(1deg); }
    }

    /* 添加按钮卡片 */
    .card-add {
      background: #fff;
      border-radius: 16px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border: 2px dashed #c7c7cc;
    }
    .card-add:active { opacity: 0.6; }
    .card-add .plus { font-size: 32px; color: #c7c7cc; }
    .card-add .label { font-size: 14px; color: #8e8e93; }

    /* 全屏 WebView 面板 */
    #panel {
      display: none;
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 200;
      flex-direction: column;
    }
    #panel.open { display: flex; }
    #panel-nav {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      padding-top: calc(12px + env(safe-area-inset-top));
      background: #fff;
      border-bottom: 1px solid #e5e5ea;
      gap: 12px;
    }
    #panel-back {
      font-size: 16px; color: #007aff;
      cursor: pointer; padding: 4px 8px;
      background: none; border: none;
    }
    #panel-title { font-size: 17px; font-weight: 600; flex: 1; }
    #panel-frame { flex: 1; border: none; width: 100%; }

    /* 添加/编辑 应用弹窗 */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 300;
      align-items: flex-end;
    }
    .modal-backdrop.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 20px 20px 0 0;
      padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
      width: 100%;
    }
    .modal h2 { font-size: 17px; font-weight: 600; margin-bottom: 20px; text-align: center; }

    .form-row { margin-bottom: 14px; }
    .form-row label { font-size: 12px; color: #8e8e93; margin-bottom: 4px; display: block; }
    .form-row input {
      width: 100%; padding: 12px;
      border: 1px solid #e5e5ea;
      border-radius: 10px; font-size: 15px;
      outline: none; background: #f2f2f7;
    }
    .form-row input:focus { border-color: #007aff; background: #fff; }

    /* Emoji 选择器 */
    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
      margin-top: 6px;
    }
    .emoji-btn {
      font-size: 24px; padding: 6px;
      border: 2px solid transparent;
      border-radius: 8px; cursor: pointer;
      background: #f2f2f7; text-align: center;
    }
    .emoji-btn.selected { border-color: #007aff; background: #e8f0fe; }

    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-cancel {
      flex: 1; padding: 14px;
      border: none; border-radius: 12px;
      background: #f2f2f7; font-size: 15px;
      cursor: pointer;
    }
    .btn-save {
      flex: 2; padding: 14px;
      border: none; border-radius: 12px;
      background: #007aff; color: #fff;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
    }
    .btn-save:active { opacity: 0.8; }
  </style>
</head>
<body>

<div class="nav">
  <h1>我的应用</h1>
  <button class="nav-btn" id="edit-btn" onclick="toggleEdit()" title="管理">⋯</button>
</div>

<div class="grid" id="app-grid"></div>

<!-- 全屏 App 面板 -->
<div id="panel">
  <div id="panel-nav">
    <button id="panel-back" onclick="closePanel()">‹ 返回</button>
    <span id="panel-title"></span>
  </div>
  <iframe id="panel-frame" allow="camera; microphone; geolocation"></iframe>
</div>

<!-- 照片同步状态条 -->
<div id="sync-bar" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:150;background:#1c1c1e;color:#fff;font-size:12px;padding:8px 16px;padding-bottom:calc(8px + env(safe-area-inset-bottom));border-top:1px solid #38383a;">
  📷 <span id="sync-msg"></span>
</div>

<!-- 添加/编辑弹窗 -->
<div class="modal-backdrop" id="modal" onclick="handleBackdropClick(event)">
  <div class="modal">
    <h2 id="modal-title">添加应用</h2>

    <div class="form-row">
      <label>应用名称</label>
      <input id="f-name" type="text" placeholder="例如：我的工具" maxlength="20" />
    </div>
    <div class="form-row">
      <label>网址 URL</label>
      <input id="f-url" type="url" placeholder="https://..." />
    </div>
    <div class="form-row">
      <label>描述（可选）</label>
      <input id="f-desc" type="text" placeholder="一句话介绍" maxlength="30" />
    </div>
    <div class="form-row">
      <label>选择图标</label>
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveApp()">保存</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/@capacitor/core@latest/dist/capacitor.js"></script>
<script src="bridge.js"></script>
<script>
  // ── 数据 ──────────────────────────────────────────────────
  const STORAGE_KEY = 'webshell_apps';
  const BUILTIN = [
    { id: 'demo', name: 'Demo', url: 'apps/demo/index.html', icon: '🧪', desc: '能力测试', builtin: true }
  ];

  const EMOJI_LIST = [
    '🌐','🛠️','📷','🗺️','📝','📊','🎵','🎨',
    '🔗','💬','📱','🏠','⚙️','🔍','📁','🌟',
    '🚀','💡','🎯','📅','🛒','🎮','📰','🔔',
    '💰','📸','🌈','🤖','🧩','📌','🔐','❤️',
  ];

  function loadApps() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) ?? [];
    } catch { return []; }
  }

  function saveApps(apps) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(apps));
  }

  // ── 渲染卡片 ──────────────────────────────────────────────
  function renderGrid() {
    const grid = document.getElementById('app-grid');
    const userApps = loadApps();
    const allApps = [...BUILTIN, ...userApps];
    grid.innerHTML = '';

    allApps.forEach(app => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        ${!app.builtin ? `<button class="delete-btn" onclick="deleteApp('${app.id}', event)">✕</button>` : ''}
        <span class="icon">${app.icon}</span>
        <span class="label">${app.name}</span>
        ${app.desc ? `<span class="desc">${app.desc}</span>` : ''}
      `;
      card.addEventListener('click', () => {
        if (document.body.classList.contains('editing')) return;
        openApp(app.name, app.url);
      });
      grid.appendChild(card);
    });

    // 添加按钮
    const addCard = document.createElement('div');
    addCard.className = 'card-add';
    addCard.innerHTML = `<span class="plus">＋</span><span class="label">添加应用</span>`;
    addCard.onclick = openModal;
    grid.appendChild(addCard);
  }

  // ── 打开 / 关闭 App ───────────────────────────────────────
  function openApp(title, url) {
    Bridge.vibrate?.();
    const isExternal = /^https?:\/\//.test(url);
    if (isExternal && window.openExternalApp) {
      // 外部 URL：交给 Native 层用独立 WKWebView 打开，无跨域限制
      window.openExternalApp(title, url);
    } else {
      // 本地文件：用内嵌 iframe 打开
      document.getElementById('panel-title').textContent = title;
      document.getElementById('panel-frame').src = url;
      document.getElementById('panel').classList.add('open');
    }
  }

  function closePanel() {
    document.getElementById('panel').classList.remove('open');
    document.getElementById('panel-frame').src = '';
  }

  // ── 编辑模式 ──────────────────────────────────────────────
  function toggleEdit() {
    document.body.classList.toggle('editing');
    document.getElementById('edit-btn').textContent =
      document.body.classList.contains('editing') ? '完成' : '⋯';
  }

  function deleteApp(id, e) {
    e.stopPropagation();
    const apps = loadApps().filter(a => a.id !== id);
    saveApps(apps);
    renderGrid();
  }

  // ── 添加弹窗 ──────────────────────────────────────────────
  let selectedEmoji = EMOJI_LIST[0];

  function buildEmojiGrid() {
    const grid = document.getElementById('emoji-grid');
    grid.innerHTML = '';
    EMOJI_LIST.forEach(em => {
      const btn = document.createElement('button');
      btn.className = 'emoji-btn' + (em === selectedEmoji ? ' selected' : '');
      btn.textContent = em;
      btn.onclick = () => {
        selectedEmoji = em;
        document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      };
      grid.appendChild(btn);
    });
  }

  function openModal() {
    if (document.body.classList.contains('editing')) {
      toggleEdit();
    }
    selectedEmoji = EMOJI_LIST[0];
    document.getElementById('f-name').value = '';
    document.getElementById('f-url').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('modal-title').textContent = '添加应用';
    buildEmojiGrid();
    document.getElementById('modal').classList.add('open');
    setTimeout(() => document.getElementById('f-name').focus(), 300);
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  function handleBackdropClick(e) {
    if (e.target === document.getElementById('modal')) closeModal();
  }

  function saveApp() {
    const name = document.getElementById('f-name').value.trim();
    let url  = document.getElementById('f-url').value.trim();
    const desc = document.getElementById('f-desc').value.trim();

    if (!name) { alert('请填写应用名称'); return; }
    if (!url)  { alert('请填写网址'); return; }
    if (!/^https?:\/\//.test(url)) url = 'https://' + url;

    const apps = loadApps();
    apps.push({
      id: 'u_' + Date.now(),
      name, url, desc,
      icon: selectedEmoji,
    });
    saveApps(apps);
    closeModal();
    renderGrid();
  }

  // ── postMessage Bridge（支持跨域远程页面）────────────────
  window.addEventListener('message', async (event) => {
    const { id, method, args } = event.data ?? {};
    if (!method || !id) return;
    let result, error;
    try {
      if (typeof Bridge[method] === 'function') {
        result = await Bridge[method](...(args ?? []));
      } else {
        throw new Error(`Bridge 没有方法: ${method}`);
      }
    } catch (e) { error = e.message; }
    const frame = document.getElementById('panel-frame');
    frame.contentWindow?.postMessage({ id, result, error }, '*');
  });

  // ── 照片同步状态显示 ──────────────────────────────────────
  let syncBarTimer = null;
  window.showSyncStatus = function(msg) {
    const bar = document.getElementById('sync-bar');
    const span = document.getElementById('sync-msg');
    if (!bar || !span) return;
    span.textContent = msg;
    bar.style.display = 'block';
    clearTimeout(syncBarTimer);
    if (msg.startsWith('✓') || msg.startsWith('❌')) {
      syncBarTimer = setTimeout(() => { bar.style.display = 'none'; }, 4000);
    }
  };

  // ── 初始化 ────────────────────────────────────────────────
  renderGrid();
</script>
</body>
</html>
